<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>AntiScam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
    integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
  <link href="plugin_ui.css" type="text/css" rel="stylesheet">
  <link href="commons.css" type="text/css" rel="stylesheet">
  <link href="percentage.css" type="text/css" rel="stylesheet">
</head>

<body>
  <div id="plugin_main">
    <label class="theme-switch" title="Đổi giao diện">
      <input id="themeToggle" type="checkbox" aria-label="Đổi giao diện sáng/tối">
      <span class="theme-slider" aria-hidden="true">
        <i class="fa-solid fa-moon theme-icon theme-icon-dark"></i>
        <i class="fa-solid fa-sun theme-icon theme-icon-light"></i>
      </span>
    </label>
    <h2 id="domain_url"></h2>

    <div id="pluginBody">
        <div id="percentage_content" class="c100 center">
          <span id="site_score" class="score">50%</span>
          <div class="slice">
            <div class="bar"></div>
            <div class="fill"></div>
          </div>
        </div>

        <h2 id="site_msg" class="site_message"></h2>
        <button type="button" class="collapsible">Xem chi tiết</button>
        <div class="feature-content">
          <ul id="features"></ul>
        </div>

        <div id="community_report">
          <button id="reportToggle" type="button">Báo cáo website</button>
          <div id="reportForm" class="report-panel" hidden>
            <textarea id="reportReason" maxlength="300" placeholder="Lý do báo cáo (ví dụ: yêu cầu OTP, giả mạo ngân hàng...)"></textarea>
            <div class="report-actions">
              <button id="sendReport" type="button">Gửi báo cáo</button>
              <button id="reportCancel" type="button">Huỷ</button>
              <span id="reportStatus"></span>
            </div>
          </div>
        </div>

    </div>
    <!-- /.plugin-body -->

    <div id="isSafe" class="is-safe">
        <p class="site-url">www.website.com</p>
        <img src="assets/shield.png" alt="this website is safe">
        <h2>Website này an toàn</h2>
    </div>
    <!-- /.is-safe will be hidden by default -->

    <div id="isPhishing" class="is-safe">
        <p class="site-url">www.website.com</p>
        <img src="assets/warning-icon.png" alt="this website is dangerous">
        <h2>Website nguy hiểm</h2>
    </div>
    <!-- /#isPhishing will be hidden by default -->

  </div>
  <!-- <script src="features.js" type="text/javascript"></script> -->
  <script src="js/jquery.js" type="text/javascript"></script>
  <script src="js/plugin_ui.js" type="text/javascript"></script>
</body>

</html>
